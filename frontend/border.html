<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu Desktop Border</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        .desktop-border {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            box-sizing: border-box;

            border: 4px solid rgba(255, 250, 240, 0.75);
            border-radius: 2px;

            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0.5;
                border-color: rgba(255, 250, 240, 0.65);
                box-shadow:
                    inset 0 0 20px 4px rgba(255, 250, 240, 0.25),
                    inset 0 0 60px 10px rgba(255, 250, 240, 0.08);
            }
            50% {
                opacity: 0.85;
                border-color: rgba(255, 250, 240, 0.9);
                box-shadow:
                    inset 0 0 35px 8px rgba(255, 250, 240, 0.4),
                    inset 0 0 90px 18px rgba(255, 250, 240, 0.15);
            }
        }
    </style>
</head>
<body>
    <div class="desktop-border"></div>
</body>
</html>
