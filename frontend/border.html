<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu Desktop Border</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        .desktop-border {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            box-sizing: border-box;
            border-radius: 12px;
            border: 3px solid rgba(255, 250, 235, 0.9);
            opacity: 0;
            animation: borderPulse 4s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0;
                box-shadow:
                    0 0 8px 2px rgba(255, 250, 235, 0),
                    inset 0 0 40px 15px rgba(255, 250, 235, 0),
                    inset 0 0 100px 40px rgba(255, 250, 235, 0),
                    inset 0 0 180px 80px rgba(255, 250, 235, 0);
            }
            40%, 60% {
                opacity: 1;
                box-shadow:
                    0 0 12px 5px rgba(255, 250, 235, 0.5),
                    inset 0 0 50px 20px rgba(255, 250, 235, 0.35),
                    inset 0 0 120px 50px rgba(255, 250, 235, 0.18),
                    inset 0 0 220px 100px rgba(255, 250, 235, 0.07);
            }
        }
    </style>
</head>
<body>
    <div class="desktop-border"></div>
</body>
</html>
