<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu Desktop Border</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0;
            width: 100%; 
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        .desktop-border {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            box-sizing: border-box;

            /* "Increase thickness" and off-white/beige tone */
            border: 10px solid rgba(255, 250, 240, 0.95);

            animation: borderPulse 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0.7;
                transform: scale(1);
                /* "fade it in as it comes closer to the ui" - deep inset shadows */
                box-shadow: 
                    inset 0 0 40px 10px rgba(255, 250, 240, 0.5), 
                    inset 0 0 100px 20px rgba(255, 250, 240, 0.2);
            }
            50% {
                opacity: 1;
                transform: scale(0.993);
                /* Intense, deep glow during the pulse */
                box-shadow: 
                    inset 0 0 60px 20px rgba(255, 250, 240, 0.7), 
                    inset 0 0 150px 40px rgba(255, 250, 240, 0.3);
            }
        }
    </style>
</head>
<body>
    <div class="desktop-border"></div>
</body>
</html>
