<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emu Desktop Border</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }

        .desktop-border {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            box-sizing: border-box;

            border: 6px solid rgba(255, 250, 240, 0.8);
            border-radius: 8px;

            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0.55;
                border-color: rgba(255, 250, 240, 0.7);
                border-width: 6px;
                box-shadow:
                    inset 0 0 30px 6px rgba(255, 250, 240, 0.3),
                    inset 0 0 80px 14px rgba(255, 250, 240, 0.1),
                    0 0 15px 3px rgba(255, 250, 240, 0.15);
            }
            50% {
                opacity: 0.9;
                border-color: rgba(255, 250, 240, 0.95);
                border-width: 8px;
                box-shadow:
                    inset 0 0 45px 10px rgba(255, 250, 240, 0.45),
                    inset 0 0 110px 22px rgba(255, 250, 240, 0.18),
                    0 0 25px 6px rgba(255, 250, 240, 0.25);
            }
        }
    </style>
</head>
<body>
    <div class="desktop-border"></div>
</body>
</html>
